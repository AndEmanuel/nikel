<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Link do CSS do bootstrap-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--Link de acesso aos ícones do bootstrap-->
    <link rel="stylesheet" href="./css/styles.css">
    <title>Nikel - Lançamentos</title>
</head>

<body id="app">
    <header>
        <nav class="navbar navbar-expand navbar-light bg-white">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="./assets/nikel-small-logo.png" alt="logo nikel" class="img-fluid">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <!-- O justify-contet-end faz com que os ícones fiquem no fim da página -->
                    <div class="d-flex menu">
                        <!-- A class="d-flax faz com que os ícones sejam organizados de forma automática "-->
                        <a href="home.html">
                            <!--Navegação entre pastas por meio do ícone declarado dentro da tag <button>. Ao clicar no ícone é retornado a página home.html-->
                            <button class="btn" type="button">
                                <i class="bi bi-house-door-fill fs-4"></i>
                            </button>
                            <!--O fs-4 é referente ao tamanho do ícone utilizado na página.-->
                        </a>
                        <a href="transactions.html">
                            <!--Navegação entre pastas por meio do ícone declarado dentro da tag <button>. Ao clicar no ícone é retornado a página home.html-->
                            <button class="btn" type="button">
                                <i class="bi bi-currency-exchange fs-4 color-secondary"></i>
                            </button>
                        </a>
                        <div class="dropdown">
                            <button class="btn" type="button" id="dropdownMenuButton1" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                <i class="bi bi-person-circle fs-4"></i>
                            </button>
                            <ul class="dropdown-menu logout" aria-labelledby="dropdownMenuButton1">
                                <li><button class="dropdown-item" id="button-logout">Sair</button></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="container-lg">
            <!--Diferente do coitainer comum, o conteiner-lg é um container responsivo que muda de largura dependendo do tamanho da tela-->
            <div class="row">
                <div class="col d-flex mt-4 justify-content-start align-items-center">
                    <i class="bi bi-currency-exchange color-primary icon-detail"></i>
                    <span class="fs-2">Lançamentos</span>
                </div>
                <div class="col d-flex mt-4 justify-content-end">
                    <div class="text-center">
                        <img src="./assets/coins-small.png" alt="image coins">
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12 info shadow-lg">
                    <div class="container">
                        <div class="row">
                            <div class="col">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th scope="col">Data</th>
                                            <th scope="col">Valor</th>
                                            <th scope="col">Tipo</th>
                                            <th scope="col">Descrição</th>
                                        </tr>
                                    </thead>
                                    <tbody id="transactions-list">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="btn button-float" data-bs-toggle="modal" data-bs-target="#transaction-modal"><i
                        class="bi bi-plus"></i></button>
                <!-- Acima na tag <button> extraimos a informação de: <i class="bi bi-cash-coin color-primary icon-detail"></i>. Acrescentamos dentro da tag <button> porém alteramos o nome da class para bi-plus que é o ícone '+' e removemos o icon-detail e o color-primary. Acrescentamos também a tag button uma class chamada de "btn button-float" que é um tipo de ícone que é fixo na tela. Foi acrescentado também a tag as informações de: data-bs-toggle="modal" data-bs-target="#register-modal" extraída do nosso index.html Na parte de Ainda não tem conta? Criar Conta. Contudo foi alterado nesta tag o #register-modal para o data-bs-target="#transaction-modal"-->
            </div>
            <!-- Modal -->
            <div class="modal fade" id="transaction-modal" tabindex="-1" aria-labelledby="exampleModalLabel"
                aria-hidden="true">
                <!-- Alguns id's precisam ser alterados para facilitar a manutenção do JavaScript, para este caso alteramos o nome padrão contido no id="", para id="transaction-modal" e alteramos o mesmo na tag <p> logo acima, onde fizemos a extração de uma parte da tag contida no modal e alteramos em cima, onde era data-bs-target="#ExampleModal" foi alterado para data-bs-target="#register-modal" -->
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="exampleModalLabel">Adicionar Lançamento</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <form id="transaction-form">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="value-input" class="form-label">Valor</label>
                                    <input type="number" step="any" class="form-control" id="value-input"
                                        aria-describedby="emailHelp">
                                </div>
                                <div class="mb-3">
                                    <label for="description-input" class="form-label">Descrição</label>
                                    <input type="text" class="form-control" id="description-input">
                                </div>
                                <div class="mb-3">
                                    <label for="date-input" class="form-label">Data</label>
                                    <input type="date" class="form-control" id="date-input">
                                </div>
                                <div class="mb-3">
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="type-input" id="inlineRadio1"
                                            value="1" checked>
                                        <label class="form-check-label" for="inlineRadio1">Entrada</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="type-input" id="inlineRadio2"
                                            value="2">
                                        <label class="form-check-label" for="inlineRadio2">Saída</label>
                                    </div>
                                </div>

                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary button-cancel"
                                    data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn button-default">Adicionar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <!-- Link of animations in JS -->

    <script src="./js/transactions.js"></script>
    <!-- Link of transactions.html with JS -->
</body>

</html>
